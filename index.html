<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پورتفولیوی فاطمه جلیلی</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Vazirmatn', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #e0e0e0;
            padding: 20px;
        }

        .portfolio {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 40px;
            background: #e0e0e0;
            box-shadow: 20px 20px 60px #bebebe, -20px -20px 60px #ffffff;
        }

        .portfolio-image img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid #e0e0e0;
            box-shadow: 8px 8px 16px #bebebe, -8px -8px 16px #ffffff;
        }

        .detail { text-align: center; }
        .detail h2 { margin-bottom: 5px; color: #333; }
        .detail p { color: #666; font-size: 0.9rem; }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .skill-tag {
            padding: 6px 15px;
            font-size: 0.8rem;
            color: #444;
            border-radius: 15px;
            background: #e0e0e0;
            box-shadow: 4px 4px 8px #bebebe, -4px -4px 8px #ffffff;
        }

        .projects-section { width: 100%; margin-top: 20px; }
        .projects-section h2 { text-align: center; margin-bottom: 15px; font-size: 1.2rem; }

        .project-card {
            background: #e9e9e9;
            border-radius: 24px;
            padding: 20px;
            box-shadow: inset 4px 4px 8px #bebebe, inset -4px -4px 8px #ffffff;
            text-align: center;
        }
        
        .project-card img { width: 100%; border-radius: 15px; margin-bottom: 10px; }

        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.3s ease;
        }
        .btn:hover { transform: scale(1.05); }

        .links a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            color: #fff;
            background: #333;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <section class="portfolio">
        <div class="portfolio-image">
            <img src="myprof.png" alt="عکس من">
        </div>
        <div class="detail">
            <h2>فاطمه جلیلی</h2>
            <p>توسعه‌دهنده فرانت‌اند</p>
        </div>

        <div class="skills-container">
            <span class="skill-tag">Web Development</span>
            <span class="skill-tag">UI/UX Design</span>
            <span class="skill-tag">JavaScript</span>
            <span class="skill-tag">CSS Animation</span>
        </div>

        <section class="projects-section">
            <h2>نمونه‌کارها</h2>
            <div class="project-card">
                <img src="ghavehchi.png" alt="سایت قهوه‌چی">
                <h3>قهوه‌چی</h3>
                <p style="font-size: 0.85rem; color: #555;">طراحی سایت کافه و فروشگاه آنلاین با رویکرد مینیمال.</p>
                <div class="links">
                    <a href="https://fatemehdev212.github.io/ghaveh-chi/" target="_blank">مشاهده پروژه</a>
                </div>
            </div>
        </section>

        <button class="btn" onclick="window.location.href='mailto:your-email@example.com'">ارتباط با من</button>
    </section>

</body>
</html>
